<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mote AI Studio</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:0;
padding:0;
text-align:center;
}

.hero{
padding:80px 20px;
}

h1{
font-size:38px;
line-height:1.4;
}

.gold{
color:#d4af37;
}

p{
color:#d0d0d0;
line-height:1.8;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 30px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

.cards{
padding:20px;
display:grid;
gap:20px;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:20px;
}

</style>
</head>

<body>

<section class="hero">

<h1>
マチアプで損してる男へ。<br>
<span class="gold">
AIで“会える設計”へ。
</span>
</h1>

<p>
写真・プロフィール・メッセージを改善して、
“会える男”に変える。
</p>

<a class="btn" href="#">
無料相談する
</a>

</section>

<section class="cards">

<div class="card">
<h2>プロフィール添削</h2>
<p>女性目線で違和感を分析。</p>
</div>

<div class="card">
<h2>メッセ生成</h2>
<p>返信率が上がる会話を生成。</p>
</div>

<div class="card">
<h2>彼氏感メーカー</h2>
<p>会いたくなる雰囲気を設計。</p>
</div>

</section>

</body>
</html>
